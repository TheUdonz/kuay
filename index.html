<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest2A | Final Fix v6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #050508; color: white; margin: 0; }
        .glass { background: rgba(20, 20, 30, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .neon-blue { text-shadow: 0 0 15px #00d2ff; color: #00d2ff; }
        .tab-active { color: #00d2ff; border-bottom: 3px solid #00d2ff; font-weight: 900; }
        .card-subj { background: #11111a; border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; padding: 15px; }
        input, select { background: #1a1a2e; border: 1px solid #333; color: white; padding: 10px; border-radius: 10px; width: 100%; margin-bottom: 10px; }
    </style>
</head>
<body class="pb-24">

    <!-- Nav -->
    <nav class="p-4 glass sticky top-0 z-50 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black neon-blue italic leading-none">QUEST 2A</h1>
            <p class="text-[8px] text-gray-500 font-bold uppercase mt-1">Created by TheUdonz</p>
        </div>
        <div id="auth-ui">
            <button onclick="window.login()" class="bg-blue-600 px-4 py-2 rounded-lg text-xs font-bold">LOGIN WITH GOOGLE</button>
        </div>
    </nav>

    <!-- Global Progress -->
    <div class="max-w-xl mx-auto p-6 text-center">
        <span class="text-[10px] font-bold text-gray-500 uppercase">Global Level 400</span>
        <div class="flex justify-center items-baseline gap-1">
            <span id="global-lv" class="text-7xl font-black neon-blue">1</span>
            <span class="text-gray-600 font-bold text-xl">/ 400</span>
        </div>
        <div class="w-full bg-gray-900 h-2 rounded-full mt-4 overflow-hidden">
            <div id="global-progress" class="bg-cyan-500 h-full" style="width: 1%"></div>
        </div>
    </div>

    <!-- Tabs -->
    <div class="max-w-xl mx-auto flex justify-around font-black text-[11px] text-gray-500 mb-6 border-b border-white/5">
        <button onclick="window.showPage('dash')" id="tab-dash" class="pb-3 tab-active">DASHBOARD</button>
        <button onclick="window.showPage('log')" id="tab-log" class="pb-3">QUEST LOG</button>
        <button onclick="window.showPage('timer')" id="tab-timer" class="pb-3">TIMER</button>
        <button onclick="window.showPage('leader')" id="tab-leader" class="pb-3">RANKING</button>
    </div>

    <!-- Pages -->
    <main class="max-w-xl mx-auto px-4">
        <!-- Dash -->
        <div id="page-dash" class="page-content space-y-4">
            <div id="subject-list" class="grid grid-cols-2 gap-3"></div>
            <div class="glass p-5 rounded-3xl mt-4">
                <div class="flex justify-between text-[10px] font-black text-yellow-500 mb-2"><span>CENTURY GAUGE</span><span id="century-label">0/100H</span></div>
                <div class="w-full bg-black h-3 rounded-full overflow-hidden"><div id="century-bar" class="bg-yellow-500 h-full" style="width: 0%"></div></div>
            </div>
            <button onclick="window.showLazy()" class="w-full py-5 bg-red-600/10 border border-red-600/30 rounded-2xl text-red-500 font-black italic">I'M LAZY TODAY...</button>
        </div>

        <!-- Log -->
        <div id="page-log" class="page-content hidden glass p-6 rounded-3xl">
            <select id="input-subj"><option value="phy">Physics</option><option value="chem">Chemistry</option><option value="bio">Biology</option><option value="math">Math</option></select>
            <input type="number" id="input-xp" placeholder="XP Amount" value="100">
            <button onclick="window.addXP()" class="w-full bg-blue-600 py-4 rounded-xl font-black uppercase">Complete Mission</button>
        </div>

        <!-- Timer -->
        <div id="page-timer" class="page-content hidden text-center py-10 space-y-8">
            <div id="timer-display" class="text-8xl font-black">25:00</div>
            <button id="timer-btn" onclick="window.toggleTimer()" class="bg-white text-black font-black px-12 py-4 rounded-full text-xl">START</button>
        </div>

        <!-- Leaderboard -->
        <div id="page-leader" class="page-content hidden glass p-6 rounded-3xl space-y-3">
            <h2 class="text-xl font-black neon-blue italic mb-4 uppercase">Top 10 Legends</h2>
            <div id="leader-list" class="space-y-2 text-xs italic text-gray-500">Login to see global rankings</div>
        </div>
    </main>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-6 z-[100]">
        <div class="text-center max-w-sm">
            <h1 class="text-5xl font-black text-red-600 mb-6 italic">WAKE UP!</h1>
            <p id="modal-quote" class="text-xl font-bold mb-10 italic"></p>
            <button onclick="window.closeModal()" class="bg-white text-black font-black px-10 py-3 rounded-full">OK, I'LL STUDY</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbPJIQRlhm9eXRiP3qQwaBs8WqPMtD8Gc",
            authDomain: "alevel-6c91e.firebaseapp.com",
            projectId: "alevel-6c91e",
            storageBucket: "alevel-6c91e.firebasestorage.app",
            messagingSenderId: "140588146719",
            appId: "1:140588146719:web:a1fddf314ff161dd8f352a",
            measurementId: "G-Z0K0S96F5Y"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let stats = JSON.parse(localStorage.getItem('quest2a_v6')) || {
            subjects: { phy: {lv:1, xp:0}, chem: {lv:1, xp:0}, bio: {lv:1, xp:0}, math: {lv:1, xp:0} },
            totalHours: 0
        };

        let user = null;

        // บังคับให้ Function เป็น Global เพื่อให้ปุ่ม onclick หาเจอ
        window.showPage = (id) => {
            document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
            document.getElementById(`page-${id}`).classList.remove('hidden');
            document.querySelectorAll('nav + div + div button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById(`tab-${id}`).classList.add('tab-active');
            if(id === 'leader') fetchLeaderboard();
        };

        window.login = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth).then(() => location.reload());

        window.addXP = () => {
            const subj = document.getElementById('input-subj').value;
            const xp = parseInt(document.getElementById('input-xp').value) || 0;
            let s = stats.subjects[subj];
            s.xp += xp;
            while(s.xp >= s.lv * 100 && s.lv < 100) { s.xp -= s.lv * 100; s.lv++; }
            save();
        };

        window.showLazy = () => {
            const qs = ["ข้อสอบไม่รอคนขี้เกียจ!", "คู่แข่งคุณกำลังอ่านอยู่!", "เลเวลสมองคุณเท่าไหร่แล้ว?"];
            document.getElementById('modal-quote').innerText = qs[Math.floor(Math.random()*qs.length)];
            document.getElementById('modal').classList.remove('hidden');
        };
        window.closeModal = () => document.getElementById('modal').classList.add('hidden');

        async function save() {
            localStorage.setItem('quest2a_v6', JSON.stringify(stats));
            render();
            if (user) {
                const totalLv = Object.values(stats.subjects).reduce((a, b) => a + b.lv, 0);
                await setDoc(doc(db, "users", user.uid), { 
                    ...stats, 
                    globalLevel: totalLv, 
                    userName: user.displayName, 
                    photo: user.photoURL 
                });
            }
        }

        function render() {
            const list = document.getElementById('subject-list');
            list.innerHTML = '';
            let total = 0;
            Object.keys(stats.subjects).forEach(k => {
                const s = stats.subjects[k];
                total += s.lv;
                list.innerHTML += `<div class="card-subj"><div class="flex justify-between text-[9px] mb-1 font-bold text-gray-500 uppercase"><span>${k}</span><span>LV. ${s.lv}</span></div><div class="w-full bg-black h-1 rounded-full overflow-hidden"><div class="bg-cyan-500 h-full progress-bar" style="width: ${(s.xp/(s.lv*100))*100}%"></div></div></div>`;
            });
            document.getElementById('global-lv').innerText = total;
            document.getElementById('global-progress').style.width = `${(total/400)*100}%`;
            document.getElementById('century-bar').style.width = `${stats.totalHours}%`;
            document.getElementById('century-label').innerText = `${stats.totalHours.toFixed(1)}/100H`;
        }

        async function fetchLeaderboard() {
            const list = document.getElementById('leader-list');
            list.innerHTML = 'Loading...';
            const q = query(collection(db, "users"), orderBy("globalLevel", "desc"), limit(10));
            const snap = await getDocs(q);
            list.innerHTML = '';
            let i = 1;
            snap.forEach(d => {
                const data = d.data();
                list.innerHTML += `<div class="flex justify-between items-center bg-white/5 p-3 rounded-xl border border-white/5"><div class="flex items-center gap-3"><span class="text-gray-600 font-bold">#${i++}</span><span class="text-xs font-bold">${data.userName}</span></div><span class="neon-blue font-black text-lg">LV. ${data.globalLevel}</span></div>`;
            });
        }

        // Timer
        let timer; let timeLeft = 25 * 60;
        window.toggleTimer = () => {
            if(timer) { clearInterval(timer); timer = null; document.getElementById('timer-btn').innerText = "START"; }
            else {
                document.getElementById('timer-btn').innerText = "PAUSE";
                timer = setInterval(() => {
                    if(timeLeft > 0) {
                        timeLeft--;
                        document.getElementById('timer-display').innerText = `${Math.floor(timeLeft/60)}:${(timeLeft%60).toString().padStart(2,'0')}`;
                    } else {
                        clearInterval(timer); stats.totalHours += 0.42; save(); alert("Focus Done!");
